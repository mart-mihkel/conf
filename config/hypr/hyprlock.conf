source = ~/.config/hypr/colors.conf

general {
    ignore_empty_input = true
    fail_timeout = 1000
}

background {
    path = $wallpaper
}

input-field {
    font_family = JetBrainsMono
    font_color = $foreground
    fail_color = $foreground
    inner_color = rgba(00000000)
    outer_color = rgba(00000000)
    check_color = rgba(00000000)
    dots_rounding = 0
    position = 0, 225
}

label {
    text = cmd[update:1000] date +"%H:%M"
    font_family = JetBrainsMono
    font_size = 96
    color = $foreground
    position = 0, 400
}

label {
    text = cmd[update:1000] date +"󰃭 %B %d. %A"
    font_family = JetBrainsMono NerdFont
    font_size = 24
    color = $foreground
    position = 0, 300
}
